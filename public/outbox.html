<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniClaw - Outbox</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .md-content { font-size: 0.875rem; line-height: 1.6; }
    .md-content p { margin: 0.4em 0; }
    .md-content p:first-child { margin-top: 0; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content h1, .md-content h2, .md-content h3 { font-weight: 600; margin: 0.6em 0 0.3em; color: #f1f5f9; }
    .md-content code { background: #1e293b; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; color: #e2e8f0; }
    .md-content pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 0.75em; margin: 0.5em 0; overflow-x: auto; }
    .md-content pre code { background: none; padding: 0; font-size: 0.8em; }
    .md-content ul, .md-content ol { margin: 0.4em 0; padding-left: 1.5em; }
    .md-content li { margin: 0.2em 0; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid #475569; padding-left: 0.75em; margin: 0.5em 0; color: #94a3b8; }
    .md-content strong { color: #f1f5f9; }
    .type-email { border-left: 3px solid #3b82f6; }
    .type-social-post { border-left: 3px solid #10b981; }
    .type-config-change { border-left: 3px solid #f59e0b; }
    .type-default { border-left: 3px solid #6b7280; }
    .badge-pending { background: #854d0e; color: #fef08a; }
    .badge-approved { background: #166534; color: #86efac; }
    .badge-rejected { background: #991b1b; color: #fca5a5; }
    .badge-sent { background: #1e3a5f; color: #93c5fd; }
    .item-card { background: #1e293b; border-radius: 8px; overflow: hidden; transition: all 0.15s; }
    .item-card:hover { background: #1e3048; }
    .feedback-thread { border-left: 2px solid #475569; }
  </style>
</head>
<body class="h-screen flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold">MiniClaw</h1>
      <nav class="flex gap-3 text-sm">
        <a href="/" class="text-gray-400 hover:text-white">Chat</a>
        <a href="/cron.html" class="text-gray-400 hover:text-white">Cron</a>
        <span class="text-blue-400 font-medium">Outbox</span>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <select id="filter" class="bg-gray-800 text-sm text-gray-300 rounded px-2 py-1 border border-gray-600">
        <option value="">All</option>
        <option value="pending" selected>Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="sent">Sent</option>
      </select>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-4">
    <div id="items" class="max-w-3xl mx-auto space-y-4"></div>
    <div id="empty" class="text-gray-500 text-center py-8 hidden">No outbox items</div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('miniclaw-token') || prompt('Auth token:');
    if (TOKEN) localStorage.setItem('miniclaw-token', TOKEN);

    const itemsEl = document.getElementById('items');
    const emptyEl = document.getElementById('empty');
    const filterEl = document.getElementById('filter');

    filterEl.addEventListener('change', loadOutbox);

    // --- Type renderers ---

    const typeRenderers = {
      'email': renderEmail,
      'social-post': renderSocialPost,
      'config-change': renderConfigChange,
    };

    function renderEmail(item) {
      const meta = item.metadata || {};
      const recipients = (meta.recipients || []).join(', ') || 'unknown';
      const sender = meta.sender || 'Wright';
      return `
        <div class="flex gap-4 text-xs text-gray-400 mb-2">
          <span>To: <span class="text-gray-200">${escapeHtml(recipients)}</span></span>
          <span>From: <span class="text-gray-200">${escapeHtml(sender)}</span></span>
        </div>
        ${item.content ? `<div class="md-content mt-2 bg-gray-900 rounded p-3">${renderMarkdown(item.content)}</div>` : ''}
        ${item.reviewPath ? `<div class="text-xs text-gray-500 mt-2">Review: <span class="font-mono text-gray-400">${escapeHtml(item.reviewPath)}</span></div>` : ''}
      `;
    }

    function renderSocialPost(item) {
      const meta = item.metadata || {};
      const platform = meta.platform || 'unknown';
      const platformColors = { reddit: '#ff4500', hackernews: '#ff6600', twitter: '#1da1f2', discord: '#5865f2' };
      const color = platformColors[platform] || '#6b7280';
      return `
        <div class="flex items-center gap-2 text-xs mb-2">
          <span class="px-2 py-0.5 rounded font-medium" style="background:${color}20;color:${color}">${escapeHtml(platform)}</span>
          ${meta.subreddit ? `<span class="text-gray-400">r/${escapeHtml(meta.subreddit)}</span>` : ''}
          ${meta.thread ? `<a href="${escapeHtml(meta.thread)}" target="_blank" class="text-blue-400 hover:underline truncate max-w-xs">thread</a>` : ''}
          ${meta.sender ? `<span class="text-gray-500">posted by ${escapeHtml(meta.sender)}</span>` : ''}
        </div>
        ${item.content ? `<div class="md-content mt-2 bg-gray-900 rounded p-3">${renderMarkdown(item.content)}</div>` : ''}
        ${item.reviewPath ? `<div class="text-xs text-gray-500 mt-2">Review: <span class="font-mono text-gray-400">${escapeHtml(item.reviewPath)}</span></div>` : ''}
      `;
    }

    function renderConfigChange(item) {
      const meta = item.metadata || {};
      const service = meta.service || 'unknown';
      const changes = meta.changes || [];
      return `
        <div class="flex items-center gap-2 text-xs mb-2">
          <span class="text-gray-400">Service:</span>
          <span class="text-purple-400 font-medium">${escapeHtml(service)}</span>
        </div>
        ${changes.length ? `<div class="flex flex-wrap gap-1 mb-2">${changes.map(c => `<span class="text-xs bg-gray-800 text-gray-300 px-2 py-0.5 rounded">${escapeHtml(c)}</span>`).join('')}</div>` : ''}
        ${item.reviewPath ? `<div class="text-xs text-gray-500 mt-2">Review: <span class="font-mono text-gray-400">${escapeHtml(item.reviewPath)}</span></div>` : ''}
      `;
    }

    function renderDefault(item) {
      return `
        ${item.content ? `<div class="md-content mt-2 bg-gray-900 rounded p-3">${renderMarkdown(item.content)}</div>` : ''}
        ${item.reviewPath ? `<div class="text-xs text-gray-500 mt-2">Review: <span class="font-mono text-gray-400">${escapeHtml(item.reviewPath)}</span></div>` : ''}
      `;
    }

    // --- Item card ---

    function createItemCard(item) {
      const card = document.createElement('div');
      const typeClass = `type-${item.type}` in document.createElement('div').style ? 'type-default' : `type-${item.type}`;
      const validTypes = ['email', 'social-post', 'config-change'];
      card.className = `item-card ${validTypes.includes(item.type) ? 'type-' + item.type : 'type-default'} p-4`;

      const statusBadge = `badge-${item.status || 'pending'}`;
      const created = item.created ? new Date(item.created).toLocaleDateString() : '';
      const renderer = typeRenderers[item.type] || renderDefault;

      card.innerHTML = `
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs px-2 py-0.5 rounded font-medium ${statusBadge}">${escapeHtml(item.status || 'pending')}</span>
              <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">${escapeHtml(item.type || 'unknown')}</span>
              <span class="text-xs text-gray-600">${created}</span>
            </div>
            <h3 class="font-medium text-sm text-gray-100">${escapeHtml(item.title || item.id)}</h3>
          </div>
        </div>
        <p class="text-sm text-gray-400 mb-3">${escapeHtml(item.description || '')}</p>
        <div class="type-content">${renderer(item)}</div>
        ${renderFeedbackThread(item)}
        <div class="actions mt-3 pt-3 border-t border-gray-700"></div>
      `;

      const actionsEl = card.querySelector('.actions');
      if (item.status === 'pending') {
        actionsEl.innerHTML = `
          <div class="flex items-center gap-2">
            <button class="btn-approve bg-green-700 hover:bg-green-600 text-white text-xs px-3 py-1.5 rounded font-medium">Approve</button>
            <button class="btn-reject bg-red-800 hover:bg-red-700 text-white text-xs px-3 py-1.5 rounded font-medium">Reject</button>
            <div class="flex-1 flex gap-2">
              <input class="feedback-input flex-1 bg-gray-800 text-white text-xs rounded px-3 py-1.5 border border-gray-600 placeholder-gray-500" placeholder="Feedback...">
              <button class="btn-feedback bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 py-1.5 rounded font-medium">Send</button>
            </div>
          </div>
        `;
        actionsEl.querySelector('.btn-approve').addEventListener('click', () => doAction(item.id, 'approve', card));
        actionsEl.querySelector('.btn-reject').addEventListener('click', () => doAction(item.id, 'reject', card));
        actionsEl.querySelector('.btn-feedback').addEventListener('click', () => {
          const input = actionsEl.querySelector('.feedback-input');
          if (input.value.trim()) {
            doAction(item.id, 'feedback', card, input.value.trim());
            input.value = '';
          }
        });
        actionsEl.querySelector('.feedback-input').addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            actionsEl.querySelector('.btn-feedback').click();
          }
        });
      } else {
        actionsEl.innerHTML = `<span class="text-xs text-gray-600">${item.status === 'approved' ? 'Approved' : item.status === 'rejected' ? 'Rejected' : item.status === 'sent' ? 'Sent' : item.status} ${item.approvedAt || item.rejectedAt || ''}</span>`;
      }

      return card;
    }

    function renderFeedbackThread(item) {
      if (!item.feedback || item.feedback.length === 0) return '';
      const entries = item.feedback.map(f => {
        const ts = f.ts ? new Date(f.ts).toLocaleString() : '';
        return `<div class="py-1"><span class="text-xs text-gray-500">${ts}</span> <span class="text-xs text-gray-300">${escapeHtml(f.text)}</span></div>`;
      }).join('');
      return `<div class="feedback-thread mt-2 pl-3 ml-1">${entries}</div>`;
    }

    // --- Actions ---

    async function doAction(id, action, card, feedback) {
      try {
        const res = await fetch(`/api/outbox/${id}/action?token=${TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, feedback }),
        });
        if (!res.ok) throw new Error('Failed');
        // Reload to reflect changes
        loadOutbox();
      } catch (e) {
        console.error('Action failed:', e);
      }
    }

    // --- Load ---

    async function loadOutbox() {
      try {
        const status = filterEl.value;
        const url = status ? `/api/outbox?status=${status}&token=${TOKEN}` : `/api/outbox?token=${TOKEN}`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();

        itemsEl.innerHTML = '';
        if (data.items.length === 0) {
          emptyEl.classList.remove('hidden');
          return;
        }
        emptyEl.classList.add('hidden');

        for (const item of data.items) {
          itemsEl.appendChild(createItemCard(item));
        }
      } catch (e) {
        console.error('Failed to load outbox:', e);
      }
    }

    // --- Helpers ---

    function renderMarkdown(text) {
      return marked.parse(text || '', { breaks: true });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadOutbox();
  </script>
</body>
</html>
