<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniClaw - Outbox</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .md-content { font-size: 0.875rem; line-height: 1.6; }
    .md-content p { margin: 0.4em 0; }
    .item-card { background: #1e293b; border-radius: 8px; border-left: 3px solid #166534; overflow: hidden; }
  </style>
</head>
<body class="h-screen flex flex-col">
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold">MiniClaw</h1>
      <nav class="flex gap-3 text-sm">
        <a href="/" class="text-gray-400 hover:text-white">Chat</a>
        <a href="/cron.html" class="text-gray-400 hover:text-white">Cron</a>
        <a href="/inbox.html" class="text-gray-400 hover:text-white">Inbox</a>
        <span class="text-blue-400 font-medium">Outbox</span>
      </nav>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-4">
    <div id="items" class="max-w-3xl mx-auto space-y-3"></div>
    <div id="empty" class="text-gray-500 text-center py-8 hidden">Outbox empty. Approved items appear here until Wright executes them.</div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('miniclaw-token') || prompt('Auth token:');
    if (TOKEN) localStorage.setItem('miniclaw-token', TOKEN);

    const itemsEl = document.getElementById('items');
    const emptyEl = document.getElementById('empty');

    const helpers = {
      esc(text) { const d = document.createElement('div'); d.textContent = String(text || ''); return d.innerHTML; },
      md(text) { return marked.parse(text || '', { breaks: true }); },
    };

    async function loadOutbox() {
      try {
        const res = await fetch(`/api/outbox?token=${TOKEN}`);
        const data = await res.json();

        itemsEl.innerHTML = '';
        if (data.items.length === 0) {
          emptyEl.classList.remove('hidden');
          return;
        }
        emptyEl.classList.add('hidden');

        for (const item of data.items) {
          const card = document.createElement('div');
          card.className = 'item-card p-4';
          const approved = item.approvedAt ? new Date(item.approvedAt).toLocaleString() : '';
          card.innerHTML = `
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">${helpers.esc(item.type)}</span>
              <span class="text-xs text-green-400">Approved ${approved}</span>
            </div>
            <h3 class="font-medium text-sm text-gray-100">${helpers.esc(item.title || item.id)}</h3>
            ${item.content ? `<details class="mt-1"><summary class="text-xs text-gray-500">Details</summary><div class="md-content bg-gray-900 rounded p-3 mt-1">${typeof item.content === 'string' ? helpers.md(item.content) : helpers.esc(JSON.stringify(item.content))}</div></details>` : ''}
          `;
          itemsEl.appendChild(card);
        }
      } catch (e) {
        console.error('Failed to load outbox:', e);
      }
    }

    loadOutbox();
  </script>
</body>
</html>
