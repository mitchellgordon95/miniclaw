<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniClaw</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    #messages { scroll-behavior: smooth; }
    .msg-user { background: #1e3a5f; }
    .msg-assistant { background: #1e293b; }
    .badge-web { background: #3b82f6; }
    .badge-sms { background: #10b981; }
    .badge-heartbeat { background: #f59e0b; }
    .badge-cron { background: #8b5cf6; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
    .md-content { font-size: 0.875rem; line-height: 1.6; }
    .md-content p { margin: 0.4em 0; }
    .md-content p:first-child { margin-top: 0; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content h1, .md-content h2, .md-content h3 { font-weight: 600; margin: 0.6em 0 0.3em; color: #f1f5f9; }
    .md-content h1 { font-size: 1.25em; }
    .md-content h2 { font-size: 1.1em; }
    .md-content h3 { font-size: 1em; }
    .md-content code { background: #1e293b; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; color: #e2e8f0; }
    .md-content pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 0.75em; margin: 0.5em 0; overflow-x: auto; }
    .md-content pre code { background: none; padding: 0; font-size: 0.8em; }
    .md-content ul, .md-content ol { margin: 0.4em 0; padding-left: 1.5em; }
    .md-content li { margin: 0.2em 0; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid #475569; padding-left: 0.75em; margin: 0.5em 0; color: #94a3b8; }
    .md-content strong { color: #f1f5f9; }
    .md-content hr { border-color: #334155; margin: 0.75em 0; }
    .tool-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin: 4px 0; max-width: 40rem; font-size: 0.75rem; font-family: monospace; overflow: hidden; }
    .tool-panel-header { padding: 4px 10px; color: #58a6ff; cursor: pointer; display: flex; justify-content: space-between; user-select: none; }
    .tool-panel-header:hover { background: #161b22; }
    .tool-panel-body { max-height: 120px; overflow-y: auto; border-top: 1px solid #30363d; }
    .tool-panel.collapsed .tool-panel-body { display: none; }
    .tool-line { padding: 2px 10px; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .tool-line:hover { background: #161b22; }
    .tool-line .tl-name { color: #58a6ff; display: inline-block; width: 65px; font-weight: 600; }
    .tool-line .tl-input { color: #c9d1d9; }
    .tool-line-detail { padding: 4px 10px 8px; color: #c9d1d9; white-space: pre-wrap; word-break: break-all; font-size: 0.7rem; border-top: 1px solid #1e293b; display: none; }
    .plan-card { background: #1a1a2e; border: 1px solid #f59e0b; border-radius: 8px; margin: 8px 0; max-width: 40rem; overflow: hidden; }
    .plan-card-header { padding: 6px 12px; color: #f59e0b; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid #f59e0b33; }
    .plan-card-body { padding: 12px; max-height: 300px; overflow-y: auto; }
    .question-card { background: #1a1a2e; border: 1px solid #6366f1; border-radius: 8px; margin: 8px 0; max-width: 40rem; overflow: hidden; }
    .question-card-header { padding: 6px 12px; color: #a5b4fc; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid #6366f133; display: flex; align-items: center; gap: 6px; }
    .question-card-body { padding: 12px; }
    .question-text { color: #e2e8f0; margin-bottom: 8px; font-size: 0.875rem; }
    .question-option { display: block; width: 100%; text-align: left; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; margin: 4px 0; color: #e2e8f0; cursor: pointer; font-size: 0.8rem; transition: border-color 0.15s, background 0.15s; }
    .question-option:hover { border-color: #6366f1; background: #1e2940; }
    .question-option.selected { border-color: #818cf8; background: #2e1065; }
    .question-option .opt-label { font-weight: 600; }
    .question-option .opt-desc { color: #94a3b8; margin-left: 6px; }
    .question-other { display: flex; gap: 6px; margin-top: 6px; }
    .question-other input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 6px 10px; color: #e2e8f0; font-size: 0.8rem; outline: none; }
    .question-other input:focus { border-color: #6366f1; }
    .question-other button { background: #6366f1; color: white; border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; }
    .question-other button:hover { background: #4f46e5; }
    .question-submit { background: #6366f1; color: white; border: none; border-radius: 6px; padding: 6px 16px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
    .question-submit:hover { background: #4f46e5; }
    .question-answered { opacity: 0.6; pointer-events: none; }
    .question-answered .question-option.selected { border-color: #22c55e; background: #14532d; }
    .question-preview { margin-top: 6px; padding: 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; }
    .typing-dot { animation: blink 1.4s infinite both; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    .agent-bar { background: #1a1a2e; border-top: 1px solid #30363d; padding: 0; overflow: hidden; transition: max-height 0.2s; max-height: 0; }
    .agent-bar.active { max-height: 200px; padding: 6px 16px; }
    .agent-chip { display: inline-flex; align-items: center; gap: 6px; background: #1e293b; border: 1px solid #8b5cf6; border-radius: 999px; padding: 3px 10px; margin: 2px 4px; font-size: 0.7rem; color: #c4b5fd; }
    .agent-chip .agent-dot { width: 6px; height: 6px; border-radius: 50%; background: #8b5cf6; animation: pulse-agent 1.5s infinite; }
    .agent-chip .agent-time { color: #6d6d8a; font-variant-numeric: tabular-nums; }
    @keyframes pulse-agent { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .attach-btn { background: #1f2937; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; padding: 0 12px; cursor: pointer; font-size: 1.1rem; line-height: 1; }
    .attach-btn:hover { background: #374151; color: #e2e8f0; }
    .uploads-wrap { background: #0d1f17; border: 1px solid #14532d; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    .uploads-label { font-size: 0.7rem; color: #86efac; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .uploads-bar { display: flex; flex-wrap: wrap; gap: 6px; }
    .upload-chip { display: inline-flex; align-items: center; gap: 6px; background: #1e293b; border: 1px solid #22c55e; border-radius: 999px; padding: 3px 4px 3px 10px; font-size: 0.75rem; color: #d1fae5; }
    .upload-chip.uploading { border-color: #f59e0b; color: #fbbf24; background: #1f1a0d; }
    .upload-chip.error { border-color: #ef4444; color: #fca5a5; background: #1f0d0d; }
    .upload-chip .uc-check { color: #22c55e; font-weight: 700; }
    .upload-chip.uploading .uc-check { display: none; }
    .upload-chip.error .uc-check { color: #ef4444; }
    .upload-chip .uc-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .upload-chip .uc-size { color: #6b7280; font-variant-numeric: tabular-nums; }
    .upload-chip .uc-x { background: #334155; color: #cbd5e1; border: none; border-radius: 999px; width: 18px; height: 18px; cursor: pointer; font-size: 0.7rem; line-height: 1; padding: 0; }
    .upload-chip .uc-x:hover { background: #475569; color: white; }
    #input-area.drag-over { outline: 2px dashed #60a5fa; outline-offset: -4px; border-radius: 8px; }
    #mic-btn.recording { background: #b91c1c; color: #fff; border-color: #ef4444; animation: mic-pulse 1.2s infinite; }
    @keyframes mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } }
  </style>
</head>
<body class="h-screen flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700">
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold">MiniClaw</h1>
      <nav class="flex gap-3 text-sm">
        <span class="text-blue-400 font-medium">Chat</span>
        <a href="/cron.html" class="text-gray-400 hover:text-white">Cron</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <span id="model-info" class="text-xs text-gray-600"></span>
      <span id="status" class="text-xs text-gray-500">disconnected</span>
      <button id="change-token" class="text-xs text-gray-600 hover:text-gray-400" title="Change auth token">&#128273;</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

  <!-- Active agents bar -->
  <div id="agent-bar" class="agent-bar"></div>

  <!-- Typing indicator -->
  <div id="typing" class="px-4 py-1 text-sm text-gray-500 hidden">
    <span id="typing-dots">
      <span class="typing-dot inline-block w-1.5 h-1.5 bg-gray-400 rounded-full"></span>
      <span class="typing-dot inline-block w-1.5 h-1.5 bg-gray-400 rounded-full ml-1"></span>
      <span class="typing-dot inline-block w-1.5 h-1.5 bg-gray-400 rounded-full ml-1"></span>
    </span>
    <span id="typing-status" class="hidden text-yellow-400 text-xs font-medium"></span>
  </div>

  <!-- Input -->
  <div id="input-area" class="p-4 border-t border-gray-700">
    <div id="plan-badge" class="hidden text-xs text-yellow-400 mb-1 flex items-center gap-1">
      <span>&#128736;</span> Plan mode <span class="text-gray-500">(shift+tab to toggle)</span>
    </div>
    <div id="uploads-wrap" class="uploads-wrap" style="display:none;">
      <div class="uploads-label">&#128206; Will attach to next message</div>
      <div id="uploads-bar" class="uploads-bar"></div>
    </div>
    <div class="flex gap-2">
      <input type="file" id="file-input" multiple style="display:none">
      <button id="attach-btn" class="attach-btn" title="Attach file">&#128206;</button>
      <button id="mic-btn" class="attach-btn" title="Voice input" style="display:none">&#127908;</button>
      <select id="effort" title="Reasoning effort for this message" class="bg-gray-800 text-gray-300 text-sm rounded-lg px-2 outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Effort: Auto</option>
        <option value="low">Low</option>
        <option value="high">High</option>
        <option value="max">Max</option>
      </select>
      <textarea id="input" rows="1" placeholder="Message Wright... (drop files here too)"
        class="flex-1 bg-gray-800 text-white rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden"
        autocomplete="off"></textarea>
      <button id="send" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Send</button>
      <button id="stop" class="hidden bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">Stop</button>
    </div>
  </div>

  <script>
    let TOKEN = localStorage.getItem('miniclaw-token');
    if (!TOKEN) TOKEN = promptForToken();

    function promptForToken() {
      const t = prompt('Auth token:');
      if (t) localStorage.setItem('miniclaw-token', t);
      return t;
    }

    function changeToken() {
      localStorage.removeItem('miniclaw-token');
      if (ws) ws.close();
      TOKEN = promptForToken();
      if (TOKEN) { loadHistory(); connect(); }
    }

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const stopBtn = document.getElementById('stop');
    const statusEl = document.getElementById('status');
    const typingEl = document.getElementById('typing');

    document.getElementById('change-token').addEventListener('click', changeToken);

    let ws = null;
    let reconnectTimer = null;
    let streamEl = null;
    let streamContent = '';
    let generating = false;

    // --- Agent tracking ---
    const activeAgents = new Map(); // id -> { description, startTime, timerInterval }
    const agentBar = document.getElementById('agent-bar');

    function addAgent(id, description) {
      if (activeAgents.has(id)) return;
      const chip = document.createElement('span');
      chip.className = 'agent-chip';
      chip.id = `agent-${id}`;
      chip.innerHTML = `<span class="agent-dot"></span><span class="agent-desc">${escapeHtml(description)}</span><span class="agent-time">0s</span>`;
      agentBar.appendChild(chip);
      agentBar.classList.add('active');
      const startTime = Date.now();
      const interval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const timeEl = chip.querySelector('.agent-time');
        if (timeEl) timeEl.textContent = elapsed < 60 ? `${elapsed}s` : `${Math.floor(elapsed / 60)}m${elapsed % 60}s`;
      }, 1000);
      activeAgents.set(id, { description, startTime, interval });
    }

    function removeAgent(id) {
      const agent = activeAgents.get(id);
      if (!agent) return;
      clearInterval(agent.interval);
      activeAgents.delete(id);
      const chip = document.getElementById(`agent-${id}`);
      if (chip) chip.remove();
      if (activeAgents.size === 0) agentBar.classList.remove('active');
    }

    // --- Load history from session transcript ---
    let historyOffset = 0;
    let historyTotal = 0;
    let loadingMore = false;

    async function loadHistory() {
      try {
        const res = await fetch(`/api/messages?limit=50&token=${TOKEN}`);
        if (!res.ok) return;
        const data = await res.json();
        historyOffset = data.offset;
        historyTotal = data.total;
        messagesEl.innerHTML = '';
        for (const msg of data.messages) renderSessionMessage(msg);
        requestAnimationFrame(() => scrollToBottom());
      } catch (e) {
        console.error('Failed to load history:', e);
      }
    }

    async function loadMore() {
      if (loadingMore || historyOffset <= 0) return;
      loadingMore = true;

      try {
        const res = await fetch(`/api/messages?limit=50&offset=${historyOffset}&token=${TOKEN}`);
        if (!res.ok) return;
        const data = await res.json();
        historyOffset = data.offset;

        // Preserve scroll position
        const prevHeight = messagesEl.scrollHeight;
        const frag = document.createDocumentFragment();
        for (const msg of data.messages) {
          renderSessionMessage(msg, frag);
        }
        messagesEl.insertBefore(frag, messagesEl.firstChild);
        messagesEl.scrollTop = messagesEl.scrollHeight - prevHeight;
      } catch (e) {
        console.error('Failed to load more:', e);
      } finally {
        loadingMore = false;
      }
    }

    messagesEl.addEventListener('scroll', () => {
      if (messagesEl.scrollTop < 100 && historyOffset > 0 && !loadingMore) {
        loadMore();
      }
    });

    function renderSessionMessage(msg, container) {
      const target = container || messagesEl;
      const content = msg.message?.content;
      const ch = msg._channel || 'web';
      if (msg.type === 'user') {
        if (typeof content === 'string') {
          target.appendChild(createMessageEl({ role: 'user', channel: ch, content }));
        } else if (Array.isArray(content)) {
          for (const block of content) {
            if (block.type === 'text') {
              target.appendChild(createMessageEl({ role: 'user', channel: ch, content: block.text }));
            }
          }
        }
      } else if (msg.type === 'assistant') {
        if (Array.isArray(content)) {
          // Group consecutive tool_use blocks into panels
          const groups = groupContentBlocks(content);
          for (const group of groups) {
            if (group.type === 'text') {
              target.appendChild(createMessageEl({ role: 'assistant', channel: ch, content: group.text }));
            } else if (group.type === 'tools') {
              renderToolPanel(target, group.blocks);
            } else if (group.type === 'plan') {
              target.appendChild(createPlanCard(group.text));
            }
          }
        }
      }
    }

    function groupContentBlocks(blocks) {
      const groups = [];
      let toolGroup = null;
      for (const block of blocks) {
        if (block.type === 'tool_use') {
          if (block.name === 'ExitPlanMode' && block.input?.plan) {
            toolGroup = null;
            groups.push({ type: 'plan', text: block.input.plan });
          } else {
            if (!toolGroup) { toolGroup = { type: 'tools', blocks: [] }; groups.push(toolGroup); }
            toolGroup.blocks.push(block);
          }
        } else {
          toolGroup = null;
          if (block.type === 'text' && block.text) {
            groups.push({ type: 'text', text: block.text });
          }
        }
      }
      return groups;
    }

    function formatToolInput(name, input) {
      if (!input) return '';
      if (name === 'Bash') return input.command || '';
      if (name === 'Read') return input.file_path || '';
      if (name === 'Edit') return input.file_path || '';
      if (name === 'Write') return input.file_path || '';
      if (name === 'Glob') return input.pattern || '';
      if (name === 'Grep') return input.pattern || '';
      if (name === 'Skill') return input.skill || '';
      if (name === 'Agent') return input.description || '';
      if (name === 'send_sms') return input.message || '';
      return JSON.stringify(input).slice(0, 200);
    }

    // --- Tool Panels ---
    let activeToolPanel = null;

    function createToolPanel() {
      const panel = document.createElement('div');
      panel.className = 'tool-panel';
      const header = document.createElement('div');
      header.className = 'tool-panel-header';
      header.innerHTML = '<span class="tp-count">0 tool calls</span><span class="tp-toggle">&#9660;</span>';
      header.addEventListener('click', () => {
        panel.classList.toggle('collapsed');
        header.querySelector('.tp-toggle').innerHTML = panel.classList.contains('collapsed') ? '&#9654;' : '&#9660;';
      });
      const body = document.createElement('div');
      body.className = 'tool-panel-body';
      panel.appendChild(header);
      panel.appendChild(body);
      return panel;
    }

    function addToolLine(panel, name, input) {
      const body = panel.querySelector('.tool-panel-body');
      const line = document.createElement('div');
      line.className = 'tool-line';
      const truncInput = (input || '').length > 80 ? input.slice(0, 80) + '...' : (input || '');
      line.innerHTML = `<span class="tl-name">${escapeHtml(name)}</span><span class="tl-input">${escapeHtml(truncInput)}</span>`;

      // Expand on click
      const detail = document.createElement('div');
      detail.className = 'tool-line-detail';
      detail.textContent = input || '';

      line.addEventListener('click', () => {
        detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
      });

      body.appendChild(line);
      body.appendChild(detail);

      // Update count
      const count = body.querySelectorAll('.tool-line').length;
      panel.querySelector('.tp-count').textContent = `${count} tool call${count !== 1 ? 's' : ''}`;

      // Auto-scroll to latest
      body.scrollTop = body.scrollHeight;
    }

    function renderToolPanel(target, toolBlocks) {
      const panel = createToolPanel();
      for (const block of toolBlocks) {
        addToolLine(panel, block.name, formatToolInput(block.name, block.input));
      }
      target.appendChild(panel);
    }

    function createPlanCard(planText) {
      const card = document.createElement('div');
      card.className = 'plan-card';
      card.innerHTML = `<div class="plan-card-header">Plan</div><div class="plan-card-body md-content">${renderMarkdown(planText)}</div>`;
      return card;
    }

    // --- Question Cards (AskUserQuestion) ---

    function createQuestionCard(questions) {
      const card = document.createElement('div');
      card.className = 'question-card';

      const header = document.createElement('div');
      header.className = 'question-card-header';
      header.innerHTML = '&#10067; Wright has a question';
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'question-card-body';

      const answers = {};
      const multiAnswers = {};

      questions.forEach((q, qi) => {
        const qDiv = document.createElement('div');
        if (qi > 0) qDiv.style.marginTop = '12px';

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = q.question;
        qDiv.appendChild(qText);

        // Preview pane (shown when an option with preview is selected)
        const previewPane = document.createElement('div');
        previewPane.className = 'question-preview';
        previewPane.style.display = 'none';
        const hasAnyPreview = q.options.some(o => o.preview);

        q.options.forEach((opt) => {
          const btn = document.createElement('button');
          btn.className = 'question-option';
          btn.innerHTML = `<span class="opt-label">${escapeHtml(opt.label)}</span>` +
            (opt.description ? `<span class="opt-desc">${escapeHtml(opt.description)}</span>` : '');

          btn.addEventListener('click', () => {
            if (q.multiSelect) {
              btn.classList.toggle('selected');
              if (!multiAnswers[qi]) multiAnswers[qi] = new Set();
              if (btn.classList.contains('selected')) multiAnswers[qi].add(opt.label);
              else multiAnswers[qi].delete(opt.label);
              answers[q.question] = [...(multiAnswers[qi] || [])].join(', ');
            } else {
              qDiv.querySelectorAll('.question-option').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              answers[q.question] = opt.label;
              // Show preview if available
              if (opt.preview) {
                previewPane.innerHTML = opt.preview;
                previewPane.style.display = 'block';
              } else if (hasAnyPreview) {
                previewPane.style.display = 'none';
              }
              // Auto-submit if single question, single select
              if (questions.length === 1 && !q.multiSelect) {
                submitAnswers();
              }
            }
          });
          qDiv.appendChild(btn);
        });

        // "Other" free-text input
        const otherDiv = document.createElement('div');
        otherDiv.className = 'question-other';
        const otherInput = document.createElement('input');
        otherInput.placeholder = 'Other...';
        const otherBtn = document.createElement('button');
        otherBtn.textContent = 'OK';
        otherBtn.addEventListener('click', () => {
          const val = otherInput.value.trim();
          if (!val) return;
          qDiv.querySelectorAll('.question-option').forEach(b => b.classList.remove('selected'));
          answers[q.question] = val;
          otherInput.style.borderColor = '#22c55e';
          if (questions.length === 1) submitAnswers();
        });
        otherInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); otherBtn.click(); }
        });
        otherDiv.appendChild(otherInput);
        otherDiv.appendChild(otherBtn);
        qDiv.appendChild(otherDiv);

        if (hasAnyPreview) qDiv.appendChild(previewPane);
        body.appendChild(qDiv);
      });

      // Submit button for multi-question or multiSelect
      if (questions.length > 1 || questions.some(q => q.multiSelect)) {
        const submitBtn = document.createElement('button');
        submitBtn.className = 'question-submit';
        submitBtn.textContent = 'Submit';
        submitBtn.addEventListener('click', submitAnswers);
        body.appendChild(submitBtn);
      }

      card.appendChild(body);

      function submitAnswers() {
        // Ensure all questions have answers
        for (const q of questions) {
          if (!answers[q.question]) {
            answers[q.question] = q.options[0]?.label || '';
          }
        }
        // Collapse to just show the selected answers
        body.innerHTML = '';
        for (const q of questions) {
          const ansDiv = document.createElement('div');
          ansDiv.style.cssText = 'font-size:0.8rem;color:#a5b4fc;padding:2px 0;';
          ansDiv.innerHTML = `<span style="color:#94a3b8">${escapeHtml(q.question)}</span> <span style="color:#e2e8f0;font-weight:600">${escapeHtml(answers[q.question])}</span>`;
          body.appendChild(ansDiv);
        }
        card.classList.add('question-answered');
        header.innerHTML = '&#9989; Answered';
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'answer', answers }));
        }
      }

      return card;
    }

    // --- WebSocket ---
    let everConnected = false;
    function connect() {
      if (!TOKEN) return;
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      let thisConnected = false;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws?token=${TOKEN}`);

      ws.onopen = () => {
        thisConnected = true;
        everConnected = true;
        statusEl.textContent = 'connected';
        statusEl.className = 'text-xs text-green-500';
      };

      ws.onclose = () => {
        if (!thisConnected && !everConnected) {
          // Never connected in this page session — likely bad token
          statusEl.textContent = 'invalid token';
          statusEl.className = 'text-xs text-red-500 cursor-pointer';
          statusEl.onclick = changeToken;
          localStorage.removeItem('miniclaw-token');
          return;
        }
        statusEl.textContent = 'reconnecting...';
        statusEl.className = 'text-xs text-yellow-500';
        statusEl.onclick = null;
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 3000);
      };

      let currentChannel = 'web';

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'message') {
          if (data.role === 'user') { currentChannel = data.channel || 'web'; confirmPendingSend(data.content); }
          addMessage(data);
          scrollToBottom();
        } else if (data.type === 'stream_end') {
          if (streamEl) {
            const el = streamEl.querySelector('.content');
            el.className = 'content md-content';
            el.innerHTML = renderMarkdown(data.content);
            // Update channel badge if response is for a non-web channel
            const ch = data.channel || currentChannel || 'web';
            const badge = streamEl.querySelector('.channel-badge');
            if (badge && ch !== 'web') badge.textContent = ch;
          } else {
            // No deltas arrived (e.g. error) — create the message directly
            addMessage({ role: 'assistant', channel: data.channel || 'web', content: data.content });
          }
          finalizeStream();
          currentChannel = 'web'; // reset after turn
          activeToolPanel = null;
          // Clear any lingering agent chips
          for (const [id] of activeAgents) removeAgent(id);
          playDoneSound();
          scrollToBottom();
        } else if (data.type === 'delta') {
          confirmPendingSend(); // server is responding -> our message landed
          activeToolPanel = null; // Text started, finalize any tool panel
          if (!streamEl) {
            streamEl = createMessageEl({ role: 'assistant', channel: currentChannel || 'web' });
            messagesEl.appendChild(streamEl);
            streamContent = '';
          }
          streamContent += data.text;
          const contentEl = streamEl.querySelector('.content');
          contentEl.className = 'content md-content';
          contentEl.innerHTML = renderMarkdown(streamContent);
          scrollToBottom();
        } else if (data.type === 'tool_start') {
          finalizeStream();
          if (!activeToolPanel) {
            activeToolPanel = createToolPanel();
            messagesEl.appendChild(activeToolPanel);
          }
          addToolLine(activeToolPanel, data.name, data.input);
          scrollToBottom();
        } else if (data.type === 'tool_result') {
          // Tool result — panel already has the line
          scrollToBottom();
        } else if (data.type === 'plan') {
          activeToolPanel = null;
          messagesEl.appendChild(createPlanCard(data.content));
          scrollToBottom();
        } else if (data.type === 'status') {
          const dots = document.getElementById('typing-dots');
          const statusEl = document.getElementById('typing-status');
          if (data.status === 'compacting') {
            dots.classList.add('hidden');
            statusEl.textContent = 'Compacting context...';
            statusEl.classList.remove('hidden');
            typingEl.classList.remove('hidden');
          } else {
            dots.classList.remove('hidden');
            statusEl.classList.add('hidden');
            statusEl.textContent = '';
          }
        } else if (data.type === 'typing') {
          const dots = document.getElementById('typing-dots');
          const statusEl = document.getElementById('typing-status');
          typingEl.classList.toggle('hidden', !data.active);
          if (!data.active) {
            dots.classList.remove('hidden');
            statusEl.classList.add('hidden');
            statusEl.textContent = '';
          }
          setGenerating(data.active);
          if (data.active) scrollToBottom();
        } else if (data.type === 'ask_user') {
          activeToolPanel = null;
          const card = createQuestionCard(data.questions);
          messagesEl.appendChild(card);
          playDoneSound();
          scrollToBottom();
        } else if (data.type === 'agent_start') {
          console.log('[ws] agent_start:', data.id, data.description);
          addAgent(data.id, data.description);
        } else if (data.type === 'agent_done') {
          console.log('[ws] agent_done:', data.id, data.description);
          removeAgent(data.id);
        } else if (data.type === 'error') {
          addMessage({ role: 'system', channel: 'web', content: `Error: ${data.message}` });
        }
      };
    }

    function finalizeStream() {
      if (streamEl) {
        streamEl = null;
        streamContent = '';
      }
    }

    // --- UI ---
    function renderMarkdown(text) {
      return marked.parse(text || '', { breaks: true });
    }

    function createMessageEl(msg) {
      const div = document.createElement('div');
      const isUser = msg.role === 'user';
      div.className = `rounded-lg p-3 max-w-2xl ${isUser ? 'msg-user ml-auto' : 'msg-assistant'}`;

      const badge = msg.channel || 'web';
      const badgeClass = `badge-${badge}`;

      const contentHtml = isUser
        ? `<pre class="content text-sm leading-relaxed">${escapeHtml(msg.content || '')}</pre>`
        : `<div class="content md-content">${renderMarkdown(msg.content || '')}</div>`;

      div.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs px-1.5 py-0.5 rounded ${badgeClass}">${badge}</span>
          <span class="text-xs text-gray-500">${isUser ? 'You' : 'Wright'}</span>
          ${msg.ts ? `<span class="text-xs text-gray-600">${new Date(msg.ts).toLocaleTimeString()}</span>` : ''}
        </div>
        ${contentHtml}
      `;
      return div;
    }

    function addMessage(msg) {
      // Don't duplicate if stream element exists for this assistant message
      if (msg.role === 'assistant' && streamEl) {
        // Remove the stream element, we'll add the final version
        streamEl.remove();
        streamEl = null;
        streamContent = '';
      }
      const el = createMessageEl(msg);
      messagesEl.appendChild(el);
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Notification Sound ---
    function playDoneSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.25);
      } catch {}
    }

    // --- Stop / Generating State ---
    function setGenerating(active) {
      generating = active;
      sendBtn.classList.toggle('hidden', active);
      stopBtn.classList.toggle('hidden', !active);
    }

    function stopGeneration() {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'stop' }));
      }
    }

    stopBtn.addEventListener('click', stopGeneration);

    // --- Plan Mode ---
    let planMode = false;
    const planBadge = document.getElementById('plan-badge');

    function togglePlanMode() {
      planMode = !planMode;
      planBadge.classList.toggle('hidden', !planMode);
      inputEl.classList.toggle('ring-2', planMode);
      inputEl.classList.toggle('ring-yellow-500', planMode);
      inputEl.placeholder = planMode ? 'Plan with Wright...' : 'Message Wright...';
    }

    // --- Send ---
    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
    }

    async function clearSession() {
      try {
        await fetch(`/api/clear?token=${TOKEN}`, { method: 'POST' });
        messagesEl.innerHTML = '';
        historyOffset = 0;
        historyTotal = 0;
      } catch (e) {
        console.error('Failed to clear session:', e);
      }
    }

    // --- Outgoing message reliability ---
    // The socket can read OPEN but be dead (e.g. laptop slept). In that case
    // ws.send() silently drops the message. We optimistically clear the input
    // but keep the text until the server echoes it back; if no echo arrives we
    // restore it instead of losing it.
    let pendingSend = null; // { content, text, timer }

    function connNotice(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'text-xs ' + (kind === 'error' ? 'text-red-500' : kind === 'warn' ? 'text-yellow-500' : 'text-green-500');
    }

    function confirmPendingSend(echoContent) {
      if (!pendingSend) return;
      // Confirm on exact echo match, or on any server activity if we can't match.
      if (echoContent === undefined || pendingSend.content === echoContent) {
        clearTimeout(pendingSend.timer);
        pendingSend = null;
      }
    }

    function forceReconnect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (ws) { try { ws.onclose = null; ws.close(); } catch {} }
      connect();
    }

    function send() {
      const text = inputEl.value.trim();
      const uploaded = uploads.filter(u => u.status === 'done');
      if (!text && uploaded.length === 0) return;
      if (text === '/clear') {
        inputEl.value = '';
        autoResize();
        clearSession();
        return;
      }
      let content = text;
      if (uploaded.length > 0) {
        const lines = uploaded.map(u => `Attached: ${u.path} (${u.originalName}, ${formatSize(u.size)})`);
        content = lines.join('\n') + (text ? '\n\n' + text : '');
      }

      // Connection guard: socket not open -> keep the message, reconnect, bail.
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        connNotice('disconnected — message kept, reconnecting…', 'error');
        forceReconnect();
        return; // do NOT clear input
      }

      try {
        const effort = document.getElementById('effort')?.value || undefined;
        ws.send(JSON.stringify({ type: 'message', content, planMode, ...(effort ? { effort } : {}) }));
      } catch (err) {
        connNotice('send failed — message kept, reconnecting…', 'error');
        forceReconnect();
        return; // do NOT clear input
      }

      // Optimistically clear, but track until the server confirms (echoes it back
      // or starts responding). If neither happens, the socket was dead -> restore.
      inputEl.value = '';
      autoResize();
      clearUploads();
      if (planMode) togglePlanMode();

      if (pendingSend) clearTimeout(pendingSend.timer);
      pendingSend = {
        content,
        text,
        timer: setTimeout(() => {
          pendingSend = null;
          if (!inputEl.value.trim()) { // don't clobber anything newly typed
            inputEl.value = text;
            autoResize();
          }
          connNotice('message didn\'t send — restored, hit enter to retry', 'error');
          forceReconnect();
        }, 7000),
      };
    }

    // --- File Uploads ---
    const uploads = []; // { id, originalName, size, status, path, chipEl }
    let uploadIdSeq = 0;
    const uploadsBar = document.getElementById('uploads-bar');
    const uploadsWrap = document.getElementById('uploads-wrap');
    const fileInput = document.getElementById('file-input');
    const attachBtn = document.getElementById('attach-btn');
    const inputArea = document.getElementById('input-area');

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + 'B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
      return (bytes / 1024 / 1024).toFixed(1) + 'MB';
    }

    function refreshUploadsBar() {
      uploadsWrap.style.display = uploads.length > 0 ? 'block' : 'none';
    }

    function clearUploads() {
      for (const u of uploads) u.chipEl?.remove();
      uploads.length = 0;
      refreshUploadsBar();
    }

    function removeUpload(id) {
      const idx = uploads.findIndex(u => u.id === id);
      if (idx === -1) return;
      uploads[idx].chipEl?.remove();
      uploads.splice(idx, 1);
      refreshUploadsBar();
    }

    function makeChip(upload) {
      const chip = document.createElement('span');
      chip.className = 'upload-chip uploading';
      chip.innerHTML = `
        <span class="uc-check">&#10003;</span>
        <span class="uc-name"></span>
        <span class="uc-size">uploading…</span>
        <button class="uc-x" title="Remove">&times;</button>
      `;
      chip.querySelector('.uc-name').textContent = upload.originalName;
      chip.querySelector('.uc-x').addEventListener('click', () => removeUpload(upload.id));
      uploadsBar.appendChild(chip);
      refreshUploadsBar();
      return chip;
    }

    async function uploadFile(file) {
      const id = ++uploadIdSeq;
      const upload = { id, originalName: file.name, size: file.size, status: 'uploading' };
      upload.chipEl = makeChip(upload);
      uploads.push(upload);

      try {
        const buf = await file.arrayBuffer();
        const b64 = arrayBufferToBase64(buf);
        const res = await fetch(`/api/upload?token=${TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: file.name, contentBase64: b64 }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'upload failed');
        upload.status = 'done';
        upload.path = data.path;
        upload.size = data.size;
        upload.chipEl.classList.remove('uploading');
        upload.chipEl.querySelector('.uc-size').textContent = formatSize(data.size);
      } catch (err) {
        console.error('Upload failed:', err);
        upload.status = 'error';
        upload.chipEl.classList.remove('uploading');
        upload.chipEl.classList.add('error');
        upload.chipEl.querySelector('.uc-size').textContent = 'error';
        upload.chipEl.title = err.message;
      }
    }

    function arrayBufferToBase64(buf) {
      const bytes = new Uint8Array(buf);
      let bin = '';
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(bin);
    }

    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      for (const f of fileInput.files) uploadFile(f);
      fileInput.value = '';
    });

    // Drag and drop on input area
    ['dragenter', 'dragover'].forEach(ev => {
      inputArea.addEventListener(ev, (e) => {
        if (!e.dataTransfer?.types?.includes('Files')) return;
        e.preventDefault();
        inputArea.classList.add('drag-over');
      });
    });
    ['dragleave', 'drop'].forEach(ev => {
      inputArea.addEventListener(ev, (e) => {
        if (ev === 'drop' && !e.dataTransfer?.types?.includes('Files')) return;
        e.preventDefault();
        inputArea.classList.remove('drag-over');
      });
    });
    inputArea.addEventListener('drop', (e) => {
      if (!e.dataTransfer?.files?.length) return;
      for (const f of e.dataTransfer.files) uploadFile(f);
    });

    // --- Voice input (record → server-side gpt-4o-transcribe) ---
    const micBtn = document.getElementById('mic-btn');
    let mediaRecorder = null;
    let audioChunks = [];
    let recording = false;
    let micStream = null;

    // Only show the mic if the browser can record audio
    if (navigator.mediaDevices?.getUserMedia && window.MediaRecorder) {
      micBtn.style.display = '';
      micBtn.addEventListener('click', toggleRecording);
    }

    async function toggleRecording() {
      if (recording) {
        stopRecording();
        return;
      }
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.warn('Mic access denied:', err);
        alert('Microphone access denied. Enable it in your browser settings.');
        return;
      }
      audioChunks = [];
      const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
        : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
      mediaRecorder = new MediaRecorder(micStream, mime ? { mimeType: mime } : undefined);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = handleRecordingStop;
      mediaRecorder.start();
      recording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Stop & transcribe';
    }

    function stopRecording() {
      if (mediaRecorder && recording) {
        try { mediaRecorder.stop(); } catch {}
      }
      recording = false;
      micBtn.classList.remove('recording');
      micStream?.getTracks().forEach(t => t.stop());
    }

    async function handleRecordingStop() {
      if (!audioChunks.length) return;
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      micBtn.disabled = true;
      micBtn.textContent = '⏳'; // hourglass
      micBtn.title = 'Transcribing...';
      try {
        const buf = await blob.arrayBuffer();
        const b64 = arrayBufferToBase64(buf);
        const res = await fetch(`/api/transcribe?token=${TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audioBase64: b64, mimeType: blob.type }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'transcription failed');
        const existing = inputEl.value.trim();
        const sep = existing && !existing.endsWith(' ') ? ' ' : '';
        inputEl.value = existing + sep + data.text;
        autoResize();
        inputEl.focus();
      } catch (err) {
        console.error('Transcription failed:', err);
        alert('Transcription failed: ' + err.message);
      } finally {
        micBtn.disabled = false;
        micBtn.textContent = '🎤'; // mic
        micBtn.title = 'Voice input';
      }
    }

    // Paste files (e.g. screenshots) into the textarea
    inputEl.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.kind === 'file') {
          const f = item.getAsFile();
          if (f) uploadFile(f);
        }
      }
    });

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('input', autoResize);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && generating) {
        e.preventDefault();
        stopGeneration();
      } else if (e.key === 'Tab' && e.shiftKey) {
        e.preventDefault();
        togglePlanMode();
      } else if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // --- Status ---
    async function loadStatus() {
      try {
        const res = await fetch(`/api/status?token=${TOKEN}`);
        if (!res.ok) return;
        const s = await res.json();
        const modelEl = document.getElementById('model-info');
        const model = (s.model || '').replace('claude-', '').replace(/-\d+$/, '');
        const auth = s.apiKeySource === 'none' ? 'max' : s.apiKeySource || '?';
        modelEl.textContent = `${model} | ${auth}`;
        modelEl.className = 'text-xs ' + (auth === 'max' ? 'text-green-600' : 'text-yellow-500');
      } catch {}
    }

    // --- Reconnect proactively when the tab wakes / network returns ---
    // Handles the laptop-sleep case: the old socket is dead, so reconnect before
    // the user tries to send (and the send() ack-timeout is the backstop).
    function wakeCheck() {
      if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
        forceReconnect();
      }
    }
    document.addEventListener('visibilitychange', () => { if (!document.hidden) wakeCheck(); });
    window.addEventListener('focus', wakeCheck);
    window.addEventListener('online', forceReconnect);

    // --- Init ---
    loadHistory();
    loadStatus();
    setInterval(loadStatus, 30000);
    connect();
    inputEl.focus();
  </script>
</body>
</html>
